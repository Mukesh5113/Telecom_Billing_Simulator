<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="760" viewBox="0 0 1000 760" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1000" height="760" fill="#f1f5f9"/>

  <!-- Header -->
  <rect width="1000" height="88" fill="url(#hdr)"/>
  <rect x="28" y="20" width="48" height="48" rx="12" fill="#ffffff" fill-opacity="0.18"/>
  <text x="52" y="51" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="800" letter-spacing="1">TBS</text>
  <text x="92" y="40" fill="#ffffff" font-size="22" font-weight="700">Telecom Billing Simulator</text>
  <text x="92" y="62" fill="#ffffff" fill-opacity="0.85" font-size="13">Rate usage, apply plans, fees, discounts &amp; taxes  then print the bill</text>

  <!-- Left control panel -->
  <rect x="24" y="112" width="300" height="360" rx="14" fill="#ffffff" filter="url(#shadow)"/>
  <text x="44" y="146" fill="#1e293b" font-size="15" font-weight="700">Run a billing cycle</text>

  <text x="44" y="180" fill="#64748b" font-size="12">Billing mode</text>
  <rect x="44" y="190" width="260" height="40" rx="9" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="58" y="215" fill="#1e293b" font-size="14">Postpaid (monthly invoice)</text>
  <path d="M288 205 l7 8 l7 -8" fill="none" stroke="#64748b" stroke-width="1.5"/>

  <text x="44" y="256" fill="#64748b" font-size="12">Account (BAN)  optional</text>
  <rect x="44" y="266" width="260" height="40" rx="9" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="58" y="291" fill="#94a3b8" font-size="14">all accounts</text>

  <rect x="44" y="326" width="260" height="44" rx="10" fill="#4f46e5"/>
  <text x="174" y="353" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">Generate Bill</text>

  <rect x="44" y="382" width="260" height="40" rx="9" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="174" y="407" text-anchor="middle" fill="#334155" font-size="13" font-weight="600">Save as PDF</text>

  <text x="44" y="448" fill="#92400e" font-size="11.5">Showing bundled SAMPLE output</text>

  <!-- Invoice card -->
  <rect x="348" y="112" width="628" height="616" rx="14" fill="#ffffff" filter="url(#shadow)"/>

  <!-- Invoice head -->
  <text x="374" y="150" fill="#1e293b" font-size="18" font-weight="700">Alice Family</text>
  <text x="374" y="172" fill="#64748b" font-size="12.5">Account (BAN): 1001</text>
  <rect x="838" y="128" width="112" height="24" rx="6" fill="#eef2ff"/>
  <text x="894" y="145" text-anchor="middle" fill="#4338ca" font-size="12" font-weight="700" letter-spacing="1">INVOICE</text>
  <text x="950" y="176" text-anchor="end" fill="#0f172a" font-size="22" font-weight="800">$94.96</text>
  <line x1="374" y1="190" x2="950" y2="190" stroke="#e2e8f0"/>

  <!-- Subscriber 5551000001 -->
  <text x="374" y="214" fill="#334155" font-size="13" font-weight="700">Subscriber 5551000001</text>

  <!-- rows -->
  <g font-size="13" fill="#1e293b">
    <rect x="374" y="224" width="46" height="20" rx="5" fill="#e0e7ff"/>
    <text x="397" y="238" text-anchor="middle" fill="#3730a3" font-size="10" font-weight="700">USAGE</text>
    <text x="432" y="238">Voice overage: 50 min</text>
    <text x="950" y="238" text-anchor="end">$5.00</text>

    <rect x="374" y="250" width="46" height="20" rx="5" fill="#e0e7ff"/>
    <text x="397" y="264" text-anchor="middle" fill="#3730a3" font-size="10" font-weight="700">USAGE</text>
    <text x="432" y="264">SMS overage: 50 msg</text>
    <text x="950" y="264" text-anchor="end">$2.50</text>

    <rect x="374" y="276" width="46" height="20" rx="5" fill="#e0e7ff"/>
    <text x="397" y="290" text-anchor="middle" fill="#3730a3" font-size="10" font-weight="700">USAGE</text>
    <text x="432" y="290">Data overage: 101 MB</text>
    <text x="950" y="290" text-anchor="end">$1.01</text>

    <rect x="374" y="302" width="80" height="20" rx="5" fill="#dcfce7"/>
    <text x="414" y="316" text-anchor="middle" fill="#166534" font-size="10" font-weight="700">RECURRING</text>
    <text x="466" y="316">Monthly plan charge (Starter 500)</text>
    <text x="950" y="316" text-anchor="end">$20.00</text>

    <rect x="374" y="328" width="34" height="20" rx="5" fill="#fef9c3"/>
    <text x="391" y="342" text-anchor="middle" fill="#854d0e" font-size="10" font-weight="700">FEE</text>
    <text x="420" y="342">Regulatory fee</text>
    <text x="950" y="342" text-anchor="end">$1.50</text>

    <rect x="374" y="354" width="34" height="20" rx="5" fill="#fef9c3"/>
    <text x="391" y="368" text-anchor="middle" fill="#854d0e" font-size="10" font-weight="700">FEE</text>
    <text x="420" y="368">Administrative fee</text>
    <text x="950" y="368" text-anchor="end">$0.99</text>

    <rect x="374" y="380" width="72" height="20" rx="5" fill="#fee2e2"/>
    <text x="410" y="394" text-anchor="middle" fill="#991b1b" font-size="10" font-weight="700">DISCOUNT</text>
    <text x="458" y="394">Loyalty 10% off recurring</text>
    <text x="950" y="394" text-anchor="end" fill="#b91c1c">-$2.00</text>
  </g>

  <text x="374" y="426" fill="#94a3b8" font-size="11" font-style="italic">& lines for 5551000002, 5551000003 and account-level credits/taxes &</text>
  <line x1="374" y1="440" x2="950" y2="440" stroke="#e2e8f0"/>

  <!-- Totals -->
  <g font-size="13">
    <text x="700" y="466" fill="#64748b">Usage</text>
    <text x="950" y="466" text-anchor="end" fill="#1e293b">$8.51</text>
    <text x="700" y="488" fill="#64748b">Recurring</text>
    <text x="950" y="488" text-anchor="end" fill="#1e293b">$85.00</text>
    <text x="700" y="510" fill="#64748b">Fees</text>
    <text x="950" y="510" text-anchor="end" fill="#1e293b">$8.48</text>
    <text x="700" y="532" fill="#64748b">Discounts</text>
    <text x="950" y="532" text-anchor="end" fill="#b91c1c">-$18.50</text>
    <text x="700" y="554" fill="#64748b">Tax</text>
    <text x="950" y="554" text-anchor="end" fill="#1e293b">$11.47</text>
  </g>
  <line x1="640" y1="570" x2="950" y2="570" stroke="#e2e8f0"/>
  <rect x="640" y="582" width="310" height="44" rx="10" fill="#0f172a"/>
  <text x="660" y="610" fill="#ffffff" font-size="14" font-weight="700" letter-spacing="1">GRAND TOTAL</text>
  <text x="932" y="611" text-anchor="end" fill="#ffffff" font-size="18" font-weight="800">$94.96</text>

  <text x="374" y="700" fill="#94a3b8" font-size="11">Money stored as integer minor units · half-away-from-zero rounding · taxes in basis points</text>
</svg>
